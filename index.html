<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>HURC 2026 春櫻限定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    :root {
      --primary: #FFB7C5;   /* 櫻花粉 */
      --secondary: #A8E6CF; /* 嫩芽綠 */
      --accent: #FFD3E0;    /* 淺粉 */
      --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #e0f2f1 100%); 
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-main: #4A5568;
      --text-muted: #718096;
      --deep-pink: #D53F8C;
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: var(--bg-gradient);
      margin: 0; padding: 40px 20px; min-height: 100vh;
      color: var(--text-main); display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    }

    #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .grid-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px; width: 100%; max-width: 1200px; position: relative; z-index: 10; margin-bottom: 40px;
    }

    .card {
      background: var(--card-bg); border-radius: 24px; padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.6);
      display: flex; flex-direction: column; backdrop-filter: blur(15px); transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--primary); }

    h1 { font-size: 20px; color: var(--deep-pink); margin: 0 0 5px 0; text-align: center; font-weight: 800; }
    h2 { font-size: 12px; color: var(--text-muted); margin: 0 0 15px 0; text-align: center; letter-spacing: 1.5px; border-bottom: 1px solid #edf2f7; padding-bottom: 12px; }

    /* 番茄鐘樣式 */
    .pomodoro-display {
      text-align: center; margin: 10px 0 20px;
    }
    .pomo-time { font-size: 56px; font-weight: 800; color: var(--deep-pink); font-family: monospace; line-height: 1; margin-bottom: 10px; }
    .pomo-label { font-size: 14px; font-weight: bold; color: #38a169; background: #e6fffa; padding: 4px 12px; border-radius: 20px; }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 700; color: #4a5568; margin-bottom: 8px; }
    input[type="text"] {
      width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 20px; text-align: center; letter-spacing: 3px; background: #fff; color: #2d3748;
    }

    button {
      width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #FFB7C5 0%, #f687b3 100%); color: #fff; box-shadow: 0 4px 15px rgba(255, 183, 197, 0.4); }
    .btn-green { background: linear-gradient(135deg, #A8E6CF 0%, #81e6d9 100%); color: #2d3748; box-shadow: 0 4px 15px rgba(168, 230, 207, 0.4); }
    .btn-outline { background: #fff; border: 2px solid var(--primary); color: var(--deep-pink); margin-top: 10px; }

    #result { margin-top: 20px; text-align: center; font-size: 15px; line-height: 1.6; }
    .countdown-box {
      margin-top: 15px; background: #fff; border: 2px solid #fff5f7; border-radius: 16px; padding: 20px; text-align: center;
      display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .countdown-flex { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
    .time-unit { background: #fffafb; padding: 10px; border-radius: 10px; min-width: 65px; border: 1px solid #ffeef2; }
    .time-num { display: block; font-size: 28px; font-weight: 800; color: var(--deep-pink); font-family: monospace; }

    .food-display {
      background: #fff; border: 2px solid var(--secondary); border-radius: 12px; padding: 30px 15px;
      margin-bottom: 15px; text-align: center; font-size: 24px; font-weight: bold; color: #38a169; min-height: 100px; display: flex; align-items: center; justify-content: center;
    }

    .footer-credit { margin-top: 30px; text-align: center; z-index: 10; }
    .footer-msg { display: inline-block; color: #718096; font-size: 13px; background: rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(4px); }

    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
  </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="grid-container">
  
  <div class="card">
    <h1>🍅 專注番茄鐘</h1>
    <h2>POMODORO TIMER</h2>
    <div class="pomodoro-display">
      <div class="pomo-label" id="pomoStatus">專注時間</div>
      <div class="pomo-time" id="pomoTime">25:00</div>
      <button class="btn-green" id="pomoBtn" onclick="togglePomo()">
        <span>▶ 開始專注</span>
      </button>
      <button class="btn-outline" onclick="resetPomo()">
        <span>🔄 重置</span>
      </button>
    </div>
    <div style="font-size:12px; color:#a0aec0; text-align:center;">
      25 分鐘專注 + 5 分鐘休息<br>
      讓春季的工作節奏更輕盈 🌸
    </div>
  </div>

  <div class="card">
    <h1>🕒 準時登出計時器</h1>
    <h2>WORK OFF CALCULATOR</h2>
    <div class="input-group">
      <label for="start">上班打卡時間 (如 0900)</label>
      <input type="text" id="start" placeholder="0900" inputmode="numeric" maxlength="4" />
    </div>
    <button class="btn-primary" onclick="calc()">
      <span>✨ 計算今日登出時間</span>
    </button>
    <div id="loading" style="display:none; text-align:center; margin:15px 0;"><span style="font-size:24px; animation:spin 1s infinite linear; display:inline-block;">🌸</span></div>
    <div id="result"></div>
    <div id="countdown" class="countdown-box">
      <div style="font-size:14px; font-weight:bold; color:#f687b3; margin-bottom:5px;">距離自由還有</div>
      <div class="countdown-flex">
        <div class="time-unit"><span class="time-num" id="h">00</span><span style="font-size:10px">時</span></div>
        <div class="time-unit"><span class="time-num" id="m">00</span><span style="font-size:10px">分</span></div>
        <div class="time-unit"><span class="time-num" id="s">00</span><span style="font-size:10px">秒</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h1>🍱 午餐救星轉盤</h1>
    <h2>LUNCH DECIDER</h2>
    <div class="food-display" id="foodResult">今天想吃什麼？</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button class="btn-green" onclick="spinFood()">🎲 隨機</button>
      <button class="btn-primary" style="background:#fff; color:#f687b3; border:1px solid #f687b3;" onclick="getTeaTime()">☕ 喝茶</button>
    </div>
    <div id="teaResult" style="margin-top:10px; text-align:center; font-size:14px; color:#D53F8C; font-weight:bold;"></div>
  </div>

</div>

<div class="footer-credit">
  <div class="footer-msg">
    沛恩：雖然我登出了，但報修可以line我
  </div>
</div>

<script>
  /* 櫻花雨動畫 */
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  let width, height, petals = [];
  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  class Petal {
    constructor() { this.init(); }
    init() { this.x = Math.random() * width; this.y = -20; this.size = Math.random() * 8 + 5; this.speed = Math.random() * 1 + 0.5; this.rotation = Math.random() * 360; }
    update() { this.y += this.speed; if (this.y > height) this.init(); }
    draw() {
      ctx.beginPath(); ctx.fillStyle = "#FFB7C5"; ctx.save(); ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation * Math.PI / 180); ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-this.size, -this.size, -this.size*1.5, this.size/2, 0, this.size);
      ctx.bezierCurveTo(this.size*1.5, this.size/2, this.size, -this.size, 0, 0);
      ctx.fill(); ctx.restore();
    }
  }
  for(let i=0; i<30; i++) petals.push(new Petal());
  function animate() { ctx.clearRect(0, 0, width, height); petals.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
  animate();

  /* 番茄鐘邏輯 */
  let pomoTime = 25 * 60;
  let pomoTimer = null;
  let isWorkMode = true;

  function togglePomo() {
    const btn = document.getElementById('pomoBtn');
    if (pomoTimer) {
      clearInterval(pomoTimer);
      pomoTimer = null;
      btn.innerHTML = "<span>▶ 繼續專注</span>";
    } else {
      pomoTimer = setInterval(updatePomo, 1000);
      btn.innerHTML = "<span>⏸ 暫停</span>";
    }
  }

  function updatePomo() {
    if (pomoTime > 0) {
      pomoTime--;
      renderPomo();
    } else {
      clearInterval(pomoTimer);
      pomoTimer = null;
      isWorkMode = !isWorkMode;
      pomoTime = (isWorkMode ? 25 : 5) * 60;
      document.getElementById('pomoStatus').innerText = isWorkMode ? "專注時間" : "休息一下";
      document.getElementById('pomoStatus').style.background = isWorkMode ? "#e6fffa" : "#fff5f7";
      alert(isWorkMode ? "開始專注工作囉！" : "辛苦了，休息五分鐘吧！");
      renderPomo();
      document.getElementById('pomoBtn').innerHTML = "<span>▶ 開始</span>";
    }
  }

  function renderPomo() {
    const m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
    const s = (pomoTime % 60).toString().padStart(2, '0');
    document.getElementById('pomoTime').innerText = `${m}:${s}`;
  }

  function resetPomo() {
    clearInterval(pomoTimer);
    pomoTimer = null;
    isWorkMode = true;
    pomoTime = 25 * 60;
    document.getElementById('pomoStatus').innerText = "專注時間";
    renderPomo();
    document.getElementById('pomoBtn').innerHTML = "<span>▶ 開始專注</span>";
  }

  /* 下班計算 */
  let timer, offTime;
  const funnyExcuses = [
    "陽光太溫暖，差點在公車站睡著 ☀️",
    "春天到了，靈魂還留在被窩裡冬眠 😴",
    "天氣好到只想去公園野餐 🧺",
    "為了吸收維生素 D，走路速度自動降為 0.5 倍 🏃‍♂️",
    "陽光太耀眼找不到來公司的路 😎",
    "俗話說春睏不是病，睏起來真的要人命 💤"
  ];

  // Enter 鍵監聽
  document.getElementById("start").addEventListener("keypress", function(e) {
    if (e.key === 'Enter') calc();
  });

  function updateTimer() {
    if (!offTime) return;
    const diff = offTime - new Date();
    if (diff <= 0) {
      clearInterval(timer);
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('result').innerHTML += "<br><strong style='color:#D53F8C;'> 時間到了，快逃！</strong>";
      return;
    }
    document.getElementById('h').textContent = String(Math.floor(diff / 3600000)).padStart(2, '0');
    document.getElementById('m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    document.getElementById('s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  }

  function calc() {
    const input = document.getElementById("start").value;
    const result = document.getElementById("result");
    const loading = document.getElementById("loading");
    const countdownBox = document.getElementById("countdown");
    
    result.innerHTML = ''; countdownBox.style.display = 'none'; loading.style.display = 'block';

    setTimeout(() => {
      loading.style.display = 'none';
      if (!input || input.length !== 4 || isNaN(input)) {
        result.innerHTML = "<span style='color:red'>❌ 格式錯誤 (如 0900)</span>";
        return;
      }
      
      const h = parseInt(input.substring(0, 2), 10);
      const m = parseInt(input.substring(2, 4), 10);
      const timeVal = h * 100 + m; 

      if (timeVal >= 2300 || timeVal < 400) { result.innerHTML = "🌙 <strong>這時間還在？</strong><br>早點睡，春天不適合熬夜。"; return; }
      if (timeVal >= 400 && timeVal < 730) { result.innerHTML = "🥱 <strong>太早了吧！</strong><br>你是先來幫辦公室植物澆水的嗎？"; return; }
      if (timeVal >= 1200 && timeVal < 2300) { result.innerHTML = "🛑 <strong>別算了，直接回家。</strong><br>現在回去剛好趕上日落。"; return; }

      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
      const workHours = 9.5 * 3600000; 
      const lateThreshold = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);

      let effectiveStart = start; 
      let htmlContent = "";

      if (start > lateThreshold) {
        const diffMins = (start - lateThreshold) / 60000;
        const units = Math.ceil(diffMins / 30);
        const leaveDurationMins = units * 30;
        effectiveStart = new Date(start.getTime() - leaveDurationMins * 60000);

        const lS = effectiveStart.getHours().toString().padStart(2,'0') + ':' + effectiveStart.getMinutes().toString().padStart(2,'0');
        const lE = h.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0');

        htmlContent += `<div style="background:#fff0f0; border-left:4px solid #f687b3; padding:10px; text-align:left; margin-bottom:10px; border-radius:4px; font-size:13px;">
          <strong style="color:#D53F8C;">⚠️ 遲到警報 (超過 09:00)</strong><br>
          建議請假：<strong>${lS} - ${lE}</strong> (${leaveDurationMins} 分鐘)<br>
          💡 理由：${funnyExcuses[Math.floor(Math.random()*funnyExcuses.length)]}
        </div>`;
      } else {
        htmlContent += "<div style='color:#38a169; font-weight:bold; margin-bottom:10px;'>✨ 準時好寶寶，今天工作也加油！</div>";
      }

      offTime = new Date(effectiveStart.getTime() + workHours);
      htmlContent += `預計逃跑時間：<span style="font-size:26px; font-weight:bold; color:#D53F8C; display:block;">${offTime.getHours().toString().padStart(2,'0')}:${offTime.getMinutes().toString().padStart(2,'0')}</span>`;
      
      result.innerHTML = htmlContent;
      countdownBox.style.display = 'block';
      if (timer) clearInterval(timer);
      updateTimer();
      timer = setInterval(updateTimer, 1000);
    }, 400); 
  }

  /* 下午茶與午餐 */
  function getTeaTime() {
    const t = ["五十嵐", "星巴克", "上宇林", "可不可", "麻古", "一沐日"];
    document.getElementById('teaResult').innerText = "建議點： " + t[Math.floor(Math.random()*t.length)];
  }
  function spinFood() {
    const f = ["便當", "乾麵", "7-11", "全家", "麥當勞", "健康餐", "拉麵", "壽司"];
    document.getElementById('foodResult').innerText = f[Math.floor(Math.random()*f.length)];
  }
</script>
</body>
</html>
